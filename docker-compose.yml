version: "3.9"

services:

  # ── MLflow tracking server ──────────────────────────────────────────────────
  mlflow:
    image: python:3.12-slim
    container_name: mlflow-server
    working_dir: /mlflow
    volumes:
      - mlflow_data:/mlflow          # persists runs across restarts
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install --no-cache-dir mlflow &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"

  # ── FastAPI inference service ───────────────────────────────────────────────
  api:
    build: .
    container_name: titanic-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models         # model trained locally is visible in container
      - ./data:/app/data             # dataset accessible for /retrain
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000   # api logs runs to mlflow container
    depends_on:
      - mlflow                       # starts after mlflow, no healthcheck needed
    restart: on-failure

volumes:
  mlflow_data:                       # named volume — survives docker compose down
