name: MLOps CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Code Quality ─────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8 black

      - name: Check formatting (black)
        run: black --check src/

      - name: Check style (flake8)
        run: flake8 src/ --max-line-length=100 --ignore=E501,W503

  # ── Job 2: Unit Tests ───────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint                        # only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .                # so src.xxx imports resolve in tests

  # ── Job 3: Train + Validate Model ──────────────────────────────────────────
  train:
    name: Train & Validate Model
    runs-on: ubuntu-latest
    needs: test                        # only trains if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python -m src.train
        env:
          PYTHONPATH: .
          MLFLOW_TRACKING_URI: ""      # local file-based tracking in CI

      - name: Verify pipeline.pkl was created
        run: |
          if [ ! -f models/pipeline.pkl ]; then
            echo "❌ pipeline.pkl not found — training failed"
            exit 1
          fi
          echo "✅ pipeline.pkl created successfully"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-pkl
          path: models/pipeline.pkl
          retention-days: 7            # keep for 7 days for debugging

  # ── Job 4: Docker Build ─────────────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train                       # only builds if training succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: pipeline-pkl
          path: models/

      - name: Build Docker image
        run: docker build -t titanic-mlops:${{ github.sha }} .

      - name: Smoke test — health endpoint
        run: |
          docker run -d -p 8000:8000 --name test-api titanic-mlops:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          echo "✅ Health check passed"
          docker stop test-api